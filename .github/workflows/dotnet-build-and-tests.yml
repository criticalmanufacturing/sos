name: .NET Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore src/app/Cmf.SoS.sln
      
    - name: Build
      run: dotnet build src/app/Cmf.SoS.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test src/app/Cmf.SoS.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      run: |
        reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coverage-report" \
          -reporttypes:"HtmlInline_AzurePipelines;MarkdownSummaryGithub"

    - name: Publish Coverage Summary
      run: cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY